name: AI-Assisted PR Review

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Ruff Lint & Format Check
  # ──────────────────────────────────────────────
  lint:
    name: Ruff Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff lint
        id: ruff_lint
        run: |
          ruff check . --output-format json > ruff-lint-report.json 2>&1 || true
          # Store exit code for later
          ruff check . > /dev/null 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Run ruff format check
        id: ruff_format
        run: |
          ruff format --check --diff . > ruff-format.diff 2>&1 || true
          ruff format --check . > /dev/null 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post lint violations as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let body = '';

            // — Ruff lint violations —
            try {
              const raw = fs.readFileSync('ruff-lint-report.json', 'utf8');
              const issues = JSON.parse(raw);
              if (issues.length > 0) {
                body += '## 🔍 Ruff Lint Violations\n\n';
                body += '| File | Line | Rule | Message |\n';
                body += '|------|------|------|---------|\n';
                for (const v of issues.slice(0, 50)) {
                  body += `| \`${v.filename}\` | ${v.location.row} | \`${v.code}\` | ${v.message} |\n`;
                }
                if (issues.length > 50) {
                  body += `\n> ⚠️ Showing first 50 of ${issues.length} violations.\n`;
                }
                body += '\n';
              }
            } catch (e) {
              // No lint report or parse error — skip
            }

            // — Ruff format violations —
            try {
              const diff = fs.readFileSync('ruff-format.diff', 'utf8').trim();
              if (diff.length > 0) {
                body += '## 🎨 Ruff Format Violations\n\n';
                body += '<details><summary>Click to expand diff</summary>\n\n';
                body += '```diff\n' + diff.slice(0, 10000) + '\n```\n';
                if (diff.length > 10000) {
                  body += '\n> ⚠️ Diff truncated. Run `ruff format .` locally to see full output.\n';
                }
                body += '</details>\n\n';
              }
            } catch (e) {
              // No format diff — skip
            }

            if (body.length > 0) {
              body = '<!-- ai-review-lint -->\n' + body;
              body += '---\n*Fix: run `ruff check . --fix && ruff format .` locally.*\n';
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body
              });
            }

      - name: Fail if lint or format issues found
        if: always()
        run: |
          lint_exit="${{ steps.ruff_lint.outputs.exit_code }}"
          format_exit="${{ steps.ruff_format.outputs.exit_code }}"
          if [[ "$lint_exit" != "0" ]] || [[ "$format_exit" != "0" ]]; then
            echo "::error::Ruff found lint or format violations. See PR comment for details."
            exit 1
          fi

  # ──────────────────────────────────────────────
  # Job 2: Mypy Type Check
  # ──────────────────────────────────────────────
  typecheck:
    name: Mypy Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run mypy
        id: mypy
        run: |
          mypy app/ --no-error-summary 2>&1 | tee mypy-output.txt || true
          mypy app/ > /dev/null 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post type errors as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const output = fs.readFileSync('mypy-output.txt', 'utf8').trim();
              if (output.length === 0) return;
              const lines = output.split('\n').filter(l => l.includes(': error:'));
              if (lines.length === 0) return;

              let body = '<!-- ai-review-typecheck -->\n';
              body += '## 🔤 Mypy Type Errors\n\n';
              body += '| File | Line | Error |\n';
              body += '|------|------|-------|\n';
              for (const line of lines.slice(0, 50)) {
                const match = line.match(/^(.+):(\d+): error: (.+?)(\s+\[.+\])?$/);
                if (match) {
                  body += `| \`${match[1]}\` | ${match[2]} | ${match[3]} |\n`;
                }
              }
              if (lines.length > 50) {
                body += `\n> ⚠️ Showing first 50 of ${lines.length} errors.\n`;
              }
              body += '\n---\n*Run `mypy app/` locally to see all type errors.*\n';

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body
              });
            } catch (e) {
              // No output — skip
            }

      - name: Fail if type errors found
        if: always()
        run: |
          mypy_exit="${{ steps.mypy.outputs.exit_code }}"
          if [ "$mypy_exit" != "0" ]; then
            echo "::error::Mypy found type errors. See PR comment for details."
            exit 1
          fi

  # ──────────────────────────────────────────────
  # Job 4: Bandit Security Scan
  # ──────────────────────────────────────────────
  security:
    name: Bandit Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        id: bandit
        run: |
          bandit -r app/ -c pyproject.toml -f json -o bandit-report.json || true
          bandit -r app/ -c pyproject.toml > /dev/null 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post security findings as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const raw = fs.readFileSync('bandit-report.json', 'utf8');
              const report = JSON.parse(raw);
              const results = report.results || [];
              if (results.length === 0) return;

              let body = '<!-- ai-review-security -->\n';
              body += '## 🛡️ Bandit Security Findings\n\n';
              body += '| Severity | Confidence | File | Line | Issue |\n';
              body += '|----------|------------|------|------|-------|\n';
              for (const r of results.slice(0, 50)) {
                const file = r.filename.replace(/^\.\//, '');
                body += `| ${r.issue_severity} | ${r.issue_confidence} | \`${file}\` | ${r.line_number} | ${r.issue_text} (${r.test_id}) |\n`;
              }
              if (results.length > 50) {
                body += `\n> ⚠️ Showing first 50 of ${results.length} findings.\n`;
              }
              body += '\n---\n*Run `bandit -r app/ -c pyproject.toml` locally to review all findings.*\n';

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body
              });
            } catch (e) {
              // No report or parse error — skip
            }

      - name: Fail if security issues found
        if: always()
        run: |
          bandit_exit="${{ steps.bandit.outputs.exit_code }}"
          if [ "$bandit_exit" != "0" ]; then
            echo "::error::Bandit found security issues. See PR comment for details."
            exit 1
          fi

  # ──────────────────────────────────────────────
  # Job 5: Pytest
  # ──────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest
        id: pytest
        run: |
          pytest --tb=short --junitxml=test-results.xml 2>&1 | tee pytest-output.txt || true
          pytest --tb=short > /dev/null 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post test failures as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const xml = fs.readFileSync('test-results.xml', 'utf8');

              // Parse JUnit XML for failures
              const failureRegex = /<testcase[^>]*classname="([^"]*)"[^>]*name="([^"]*)"[^>]*(?:time="([^"]*)")?[^>]*>\s*<failure[^>]*message="([^"]*)"[^>]*>([\s\S]*?)<\/failure>/g;
              const errorRegex = /<testcase[^>]*classname="([^"]*)"[^>]*name="([^"]*)"[^>]*(?:time="([^"]*)")?[^>]*>\s*<error[^>]*message="([^"]*)"[^>]*>([\s\S]*?)<\/error>/g;

              let failures = [];
              let match;
              while ((match = failureRegex.exec(xml)) !== null) {
                failures.push({ cls: match[1], name: match[2], message: match[4], detail: match[5] });
              }
              while ((match = errorRegex.exec(xml)) !== null) {
                failures.push({ cls: match[1], name: match[2], message: match[4], detail: match[5] });
              }

              if (failures.length === 0) return;

              let body = '<!-- ai-review-test -->\n';
              body += '## 🧪 Test Failures\n\n';
              for (const f of failures.slice(0, 20)) {
                body += `### ❌ \`${f.cls}::${f.name}\`\n`;
                body += `**Message:** ${f.message}\n\n`;
                const detail = f.detail.trim().slice(0, 2000);
                body += '<details><summary>Traceback</summary>\n\n```\n' + detail + '\n```\n</details>\n\n';
              }
              if (failures.length > 20) {
                body += `> ⚠️ Showing first 20 of ${failures.length} failures.\n`;
              }
              body += '---\n*Run `pytest --tb=short` locally to reproduce.*\n';

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body
              });
            } catch (e) {
              // No test results — skip
            }

      - name: Fail if tests failed
        if: always()
        run: |
          test_exit="${{ steps.pytest.outputs.exit_code }}"
          if [ "$test_exit" != "0" ]; then
            echo "::error::Tests failed. See PR comment for details."
            exit 1
          fi

  # ──────────────────────────────────────────────
  # Job 6: Request Copilot Review
  # ──────────────────────────────────────────────
  request-copilot-review:
    name: Request Copilot Review
    runs-on: ubuntu-latest
    needs: [lint, typecheck, security, test]
    if: always()
    steps:
      - name: Request Copilot as reviewer
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                reviewers: ["copilot"],
              });
            } catch (error) {
              core.warning(`Could not request Copilot review: ${error.message}`);
            }

  # ──────────────────────────────────────────────
  # Job 7: Summary
  # ──────────────────────────────────────────────
  summary:
    name: Post Review Summary
    runs-on: ubuntu-latest
    needs: [lint, typecheck, security, test, request-copilot-review]
    if: always()
    steps:
      - name: Post summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const status = (result) => result === 'success' ? '✅ Passed' : '❌ Failed';
            const lintResult = '${{ needs.lint.result }}';
            const typecheckResult = '${{ needs.typecheck.result }}';
            const securityResult = '${{ needs.security.result }}';
            const testResult = '${{ needs.test.result }}';
            const copilotResult = '${{ needs.request-copilot-review.result }}';

            const allPassed = lintResult === 'success' && typecheckResult === 'success' && securityResult === 'success' && testResult === 'success';

            let body = '<!-- ai-review-summary -->\n';
            body += '## 📊 AI-Assisted PR Review Summary\n\n';
            body += '| Check | Status |\n';
            body += '|-------|--------|\n';
            body += `| 🔍 Ruff Lint & Format | ${status(lintResult)} |\n`;
            body += `| 🔤 Mypy Type Check | ${status(typecheckResult)} |\n`;
            body += `| 🛡️ Bandit Security | ${status(securityResult)} |\n`;
            body += `| 🧪 Tests | ${status(testResult)} |\n`;
            body += `| 🤖 Copilot Review | ${copilotResult === 'success' ? '✅ Requested' : '⚠️ Skipped'} |\n`;
            body += '\n';

            if (allPassed) {
              body += '> **All quality gates passed.** This PR is ready for human review.\n';
            } else {
              body += '> **Some quality gates failed.** Please fix the violations listed above before merging.\n';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });
