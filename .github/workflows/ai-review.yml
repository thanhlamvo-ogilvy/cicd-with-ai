name: AI-Assisted PR Review

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Ruff Lint & Format Check
  # ──────────────────────────────────────────────
  lint:
    name: Ruff Lint & Format Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff lint
        id: ruff_lint
        run: |
          ruff check . --output-format json > ruff-lint-report.json 2>&1 || true
          # Store exit code for later
          ruff check . > /dev/null 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Run ruff format check
        id: ruff_format
        run: |
          ruff format --check --diff . > ruff-format.diff 2>&1 || true
          ruff format --check . > /dev/null 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post lint violations as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let body = '';

            // — Ruff lint violations —
            try {
              const raw = fs.readFileSync('backend/ruff-lint-report.json', 'utf8');
              const issues = JSON.parse(raw);
              if (issues.length > 0) {
                body += '## 🔍 Ruff Lint Violations\n\n';
                body += '| File | Line | Rule | Message |\n';
                body += '|------|------|------|---------|\n';
                for (const v of issues.slice(0, 50)) {
                  body += `| \`${v.filename}\` | ${v.location.row} | \`${v.code}\` | ${v.message} |\n`;
                }
                if (issues.length > 50) {
                  body += `\n> ⚠️ Showing first 50 of ${issues.length} violations.\n`;
                }
                body += '\n';
              }
            } catch (e) {
              // No lint report or parse error — skip
            }

            // — Ruff format violations —
            try {
              const diff = fs.readFileSync('backend/ruff-format.diff', 'utf8').trim();
              if (diff.length > 0) {
                body += '## 🎨 Ruff Format Violations\n\n';
                body += '<details><summary>Click to expand diff</summary>\n\n';
                body += '```diff\n' + diff.slice(0, 10000) + '\n```\n';
                if (diff.length > 10000) {
                  body += '\n> ⚠️ Diff truncated. Run `ruff format .` locally to see full output.\n';
                }
                body += '</details>\n\n';
              }
            } catch (e) {
              // No format diff — skip
            }

            if (body.length > 0) {
              body = '<!-- ai-review-lint -->\n' + body;
              body += '---\n*Fix: run `cd backend && ruff check . --fix && ruff format .` locally.*\n';
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body
              });
            }

      - name: Fail if lint or format issues found
        if: always()
        run: |
          lint_exit="${{ steps.ruff_lint.outputs.exit_code }}"
          format_exit="${{ steps.ruff_format.outputs.exit_code }}"
          if [[ "$lint_exit" != "0" ]] || [[ "$format_exit" != "0" ]]; then
            echo "::error::Ruff found lint or format violations. See PR comment for details."
            exit 1
          fi

  # ──────────────────────────────────────────────
  # Job 2: Mypy Type Check
  # ──────────────────────────────────────────────
  typecheck:
    name: Mypy Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run mypy
        id: mypy
        run: |
          mypy app/ --no-error-summary 2>&1 | tee mypy-output.txt || true
          mypy app/ > /dev/null 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post type errors as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const output = fs.readFileSync('backend/mypy-output.txt', 'utf8').trim();
              if (output.length === 0) return;
              const lines = output.split('\n').filter(l => l.includes(': error:'));
              if (lines.length === 0) return;

              let body = '<!-- ai-review-typecheck -->\n';
              body += '## 🔤 Mypy Type Errors\n\n';
              body += '| File | Line | Error |\n';
              body += '|------|------|-------|\n';
              for (const line of lines.slice(0, 50)) {
                const match = line.match(/^(.+):(\d+): error: (.+?)(\s+\[.+\])?$/);
                if (match) {
                  body += `| \`${match[1]}\` | ${match[2]} | ${match[3]} |\n`;
                }
              }
              if (lines.length > 50) {
                body += `\n> ⚠️ Showing first 50 of ${lines.length} errors.\n`;
              }
              body += '\n---\n*Run `cd backend && mypy app/` locally to see all type errors.*\n';

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body
              });
            } catch (e) {
              // No output — skip
            }

      - name: Fail if type errors found
        if: always()
        run: |
          mypy_exit="${{ steps.mypy.outputs.exit_code }}"
          if [ "$mypy_exit" != "0" ]; then
            echo "::error::Mypy found type errors. See PR comment for details."
            exit 1
          fi

  # ──────────────────────────────────────────────
  # Job 4: Bandit Security Scan
  # ──────────────────────────────────────────────
  security:
    name: Bandit Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        id: bandit
        run: |
          bandit -r app/ -c pyproject.toml -f json -o bandit-report.json || true
          bandit -r app/ -c pyproject.toml > /dev/null 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post security findings as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const raw = fs.readFileSync('backend/bandit-report.json', 'utf8');
              const report = JSON.parse(raw);
              const results = report.results || [];
              if (results.length === 0) return;

              let body = '<!-- ai-review-security -->\n';
              body += '## 🛡️ Bandit Security Findings\n\n';
              body += '| Severity | Confidence | File | Line | Issue |\n';
              body += '|----------|------------|------|------|-------|\n';
              for (const r of results.slice(0, 50)) {
                const file = r.filename.replace(/^\.\//, '');
                body += `| ${r.issue_severity} | ${r.issue_confidence} | \`${file}\` | ${r.line_number} | ${r.issue_text} (${r.test_id}) |\n`;
              }
              if (results.length > 50) {
                body += `\n> ⚠️ Showing first 50 of ${results.length} findings.\n`;
              }
              body += '\n---\n*Run `cd backend && bandit -r app/ -c pyproject.toml` locally to review all findings.*\n';

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body
              });
            } catch (e) {
              // No report or parse error — skip
            }

      - name: Fail if security issues found
        if: always()
        run: |
          bandit_exit="${{ steps.bandit.outputs.exit_code }}"
          if [ "$bandit_exit" != "0" ]; then
            echo "::error::Bandit found security issues. See PR comment for details."
            exit 1
          fi

  # ──────────────────────────────────────────────
  # Job 5: Pytest
  # ──────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest
        id: pytest
        run: |
          pytest --tb=short --junitxml=test-results.xml 2>&1 | tee pytest-output.txt || true
          pytest --tb=short > /dev/null 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post test failures as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const xml = fs.readFileSync('backend/test-results.xml', 'utf8');

              // Parse JUnit XML for failures
              const failureRegex = /<testcase[^>]*classname="([^"]*)"[^>]*name="([^"]*)"[^>]*(?:time="([^"]*)")?[^>]*>\s*<failure[^>]*message="([^"]*)"[^>]*>([\s\S]*?)<\/failure>/g;
              const errorRegex = /<testcase[^>]*classname="([^"]*)"[^>]*name="([^"]*)"[^>]*(?:time="([^"]*)")?[^>]*>\s*<error[^>]*message="([^"]*)"[^>]*>([\s\S]*?)<\/error>/g;

              let failures = [];
              let match;
              while ((match = failureRegex.exec(xml)) !== null) {
                failures.push({ cls: match[1], name: match[2], message: match[4], detail: match[5] });
              }
              while ((match = errorRegex.exec(xml)) !== null) {
                failures.push({ cls: match[1], name: match[2], message: match[4], detail: match[5] });
              }

              if (failures.length === 0) return;

              let body = '<!-- ai-review-test -->\n';
              body += '## 🧪 Test Failures\n\n';
              for (const f of failures.slice(0, 20)) {
                body += `### ❌ \`${f.cls}::${f.name}\`\n`;
                body += `**Message:** ${f.message}\n\n`;
                const detail = f.detail.trim().slice(0, 2000);
                body += '<details><summary>Traceback</summary>\n\n```\n' + detail + '\n```\n</details>\n\n';
              }
              if (failures.length > 20) {
                body += `> ⚠️ Showing first 20 of ${failures.length} failures.\n`;
              }
              body += '---\n*Run `cd backend && pytest --tb=short` locally to reproduce.*\n';

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body
              });
            } catch (e) {
              // No test results — skip
            }

      - name: Fail if tests failed
        if: always()
        run: |
          test_exit="${{ steps.pytest.outputs.exit_code }}"
          if [ "$test_exit" != "0" ]; then
            echo "::error::Tests failed. See PR comment for details."
            exit 1
          fi

  # ──────────────────────────────────────────────
  # Job 6: Frontend ESLint Lint
  # ──────────────────────────────────────────────
  frontend-lint:
    name: Frontend ESLint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: eslint
        run: |
          npx eslint . --format json -o eslint-report.json 2>&1 || true
          npx eslint . > /dev/null 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post lint violations as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const raw = fs.readFileSync('frontend/eslint-report.json', 'utf8');
              const results = JSON.parse(raw);
              const violations = results.flatMap(f =>
                f.messages.map(m => ({
                  file: f.filePath.replace(process.cwd() + '/', ''),
                  line: m.line,
                  rule: m.ruleId || 'parse-error',
                  message: m.message
                }))
              );
              if (violations.length === 0) return;

              let body = '<!-- ai-review-frontend-lint -->\n';
              body += '## 🔍 Frontend ESLint Violations\n\n';
              body += '| File | Line | Rule | Message |\n';
              body += '|------|------|------|---------|\n';
              for (const v of violations.slice(0, 50)) {
                body += `| \`${v.file}\` | ${v.line} | \`${v.rule}\` | ${v.message} |\n`;
              }
              if (violations.length > 50) {
                body += `\n> ⚠️ Showing first 50 of ${violations.length} violations.\n`;
              }
              body += '\n---\n*Fix: run `cd frontend && npm run lint:fix` locally.*\n';

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body
              });
            } catch (e) {
              // No report — skip
            }

      - name: Fail if lint violations found
        if: always()
        run: |
          eslint_exit="${{ steps.eslint.outputs.exit_code }}"
          if [ "$eslint_exit" != "0" ]; then
            echo "::error::ESLint found violations. See PR comment for details."
            exit 1
          fi

  # ──────────────────────────────────────────────
  # Job 7: Frontend TypeScript Check
  # ──────────────────────────────────────────────
  frontend-typecheck:
    name: Frontend TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tsc --noEmit
        id: tsc
        run: |
          npx tsc --noEmit 2>&1 | tee tsc-output.txt || true
          npx tsc --noEmit > /dev/null 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post type errors as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const output = fs.readFileSync('frontend/tsc-output.txt', 'utf8').trim();
              if (output.length === 0) return;
              const lines = output.split('\n').filter(l => l.includes(': error TS'));
              if (lines.length === 0) return;

              let body = '<!-- ai-review-frontend-typecheck -->\n';
              body += '## 🔤 Frontend TypeScript Errors\n\n';
              body += '| File | Line | Error |\n';
              body += '|------|------|-------|\n';
              for (const line of lines.slice(0, 50)) {
                const match = line.match(/^(.+)\((\d+),\d+\): error TS\d+: (.+)$/);
                if (match) {
                  body += `| \`${match[1]}\` | ${match[2]} | ${match[3]} |\n`;
                }
              }
              if (lines.length > 50) {
                body += `\n> ⚠️ Showing first 50 of ${lines.length} errors.\n`;
              }
              body += '\n---\n*Run `cd frontend && npx tsc --noEmit` locally to see all type errors.*\n';

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body
              });
            } catch (e) {
              // No output — skip
            }

      - name: Fail if type errors found
        if: always()
        run: |
          tsc_exit="${{ steps.tsc.outputs.exit_code }}"
          if [ "$tsc_exit" != "0" ]; then
            echo "::error::TypeScript found type errors. See PR comment for details."
            exit 1
          fi

  # ──────────────────────────────────────────────
  # Job 8: Frontend Vitest
  # ──────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        id: vitest
        run: |
          npx vitest run --reporter=junit --outputFile=test-results.xml 2>&1 | tee vitest-output.txt || true
          npx vitest run > /dev/null 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post test failures as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const xml = fs.readFileSync('frontend/test-results.xml', 'utf8');
              const failureRegex = /<testcase[^>]*classname="([^"]*)"[^>]*name="([^"]*)"[^>]*>\s*<failure[^>]*(?:message="([^"]*)")?[^>]*>([\s\S]*?)<\/failure>/g;

              let failures = [];
              let match;
              while ((match = failureRegex.exec(xml)) !== null) {
                failures.push({ cls: match[1], name: match[2], message: match[3] || '', detail: match[4] });
              }
              if (failures.length === 0) return;

              let body = '<!-- ai-review-frontend-test -->\n';
              body += '## 🧪 Frontend Test Failures\n\n';
              for (const f of failures.slice(0, 20)) {
                body += `### ❌ \`${f.cls} > ${f.name}\`\n`;
                if (f.message) body += `**Message:** ${f.message}\n\n`;
                const detail = f.detail.trim().slice(0, 2000);
                if (detail) body += '<details><summary>Details</summary>\n\n```\n' + detail + '\n```\n</details>\n\n';
              }
              if (failures.length > 20) {
                body += `> ⚠️ Showing first 20 of ${failures.length} failures.\n`;
              }
              body += '---\n*Run `cd frontend && npm run test:run` locally to reproduce.*\n';

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body
              });
            } catch (e) {
              // No test results — skip
            }

      - name: Fail if tests failed
        if: always()
        run: |
          vitest_exit="${{ steps.vitest.outputs.exit_code }}"
          if [ "$vitest_exit" != "0" ]; then
            echo "::error::Frontend tests failed. See PR comment for details."
            exit 1
          fi

  # ──────────────────────────────────────────────
  # Job 9: Frontend Bundle Size Check
  # ──────────────────────────────────────────────
  frontend-bundle-size:
    name: Frontend Bundle Size
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      BUNDLE_BUDGET_KB: 200
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and check bundle size
        id: bundle
        run: |
          npm run build 2>&1 | tee build-output.txt
          # Calculate total gzipped JS size
          total_bytes=0
          for f in dist/assets/*.js; do
            gz_size=$(gzip -c "$f" | wc -c | tr -d ' ')
            total_bytes=$((total_bytes + gz_size))
          done
          total_kb=$((total_bytes / 1024))
          echo "size_kb=$total_kb" >> "$GITHUB_OUTPUT"
          echo "budget_kb=$BUNDLE_BUDGET_KB" >> "$GITHUB_OUTPUT"
          if [ "$total_kb" -gt "$BUNDLE_BUDGET_KB" ]; then
            echo "over_budget=true" >> "$GITHUB_OUTPUT"
          else
            echo "over_budget=false" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Post bundle size as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const sizeKb = '${{ steps.bundle.outputs.size_kb }}';
            const budgetKb = '${{ steps.bundle.outputs.budget_kb }}';
            const overBudget = '${{ steps.bundle.outputs.over_budget }}' === 'true';

            const icon = overBudget ? '🔴' : '🟢';
            const status = overBudget ? 'OVER BUDGET' : 'Within budget';
            let body = '<!-- ai-review-frontend-bundle -->\n';
            body += '## 📦 Frontend Bundle Size\n\n';
            body += `| Metric | Value |\n`;
            body += `|--------|-------|\n`;
            body += `| Gzipped JS | ${sizeKb} KB |\n`;
            body += `| Budget | ${budgetKb} KB |\n`;
            body += `| Status | ${icon} ${status} |\n`;

            if (overBudget) {
              body += `\n> ⚠️ Bundle is ${sizeKb - budgetKb} KB over budget. Consider code splitting or removing unused dependencies.\n`;
            }
            body += '\n---\n*Run `cd frontend && npm run build` locally to check bundle size.*\n';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

      - name: Fail if over budget
        if: always()
        run: |
          if [ "${{ steps.bundle.outputs.over_budget }}" = "true" ]; then
            echo "::error::Bundle size (${{ steps.bundle.outputs.size_kb }} KB) exceeds budget (${{ steps.bundle.outputs.budget_kb }} KB)."
            exit 1
          fi

  # ──────────────────────────────────────────────
  # Job 10: Request Copilot Review
  # ──────────────────────────────────────────────
  request-copilot-review:
    name: Request Copilot Review
    runs-on: ubuntu-latest
    needs: [lint, typecheck, security, test, frontend-lint, frontend-typecheck, frontend-test, frontend-bundle-size]
    if: always()
    steps:
      - name: Request Copilot as reviewer
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                reviewers: ["copilot"],
              });
            } catch (error) {
              core.warning(`Could not request Copilot review: ${error.message}`);
            }

  # ──────────────────────────────────────────────
  # Job 11: Summary
  # ──────────────────────────────────────────────
  summary:
    name: Post Review Summary
    runs-on: ubuntu-latest
    needs: [lint, typecheck, security, test, frontend-lint, frontend-typecheck, frontend-test, frontend-bundle-size, request-copilot-review]
    if: always()
    steps:
      - name: Post summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const status = (result) => result === 'success' ? '✅ Passed' : '❌ Failed';
            const lintResult = '${{ needs.lint.result }}';
            const typecheckResult = '${{ needs.typecheck.result }}';
            const securityResult = '${{ needs.security.result }}';
            const testResult = '${{ needs.test.result }}';
            const feLintResult = '${{ needs.frontend-lint.result }}';
            const feTypecheckResult = '${{ needs.frontend-typecheck.result }}';
            const feTestResult = '${{ needs.frontend-test.result }}';
            const feBundleResult = '${{ needs.frontend-bundle-size.result }}';
            const copilotResult = '${{ needs.request-copilot-review.result }}';

            const allPassed = [lintResult, typecheckResult, securityResult, testResult, feLintResult, feTypecheckResult, feTestResult, feBundleResult].every(r => r === 'success');

            let body = '<!-- ai-review-summary -->\n';
            body += '## 📊 AI-Assisted PR Review Summary\n\n';
            body += '| Check | Status |\n';
            body += '|-------|--------|\n';
            body += `| 🔍 Backend Ruff Lint & Format | ${status(lintResult)} |\n`;
            body += `| 🔤 Backend Mypy Type Check | ${status(typecheckResult)} |\n`;
            body += `| 🛡️ Backend Bandit Security | ${status(securityResult)} |\n`;
            body += `| 🧪 Backend Tests | ${status(testResult)} |\n`;
            body += `| 🔍 Frontend ESLint | ${status(feLintResult)} |\n`;
            body += `| 🔤 Frontend TypeCheck | ${status(feTypecheckResult)} |\n`;
            body += `| 🧪 Frontend Tests | ${status(feTestResult)} |\n`;
            body += `| 📦 Frontend Bundle Size | ${status(feBundleResult)} |\n`;
            body += `| 🤖 Copilot Review | ${copilotResult === 'success' ? '✅ Requested' : '⚠️ Skipped'} |\n`;
            body += '\n';

            if (allPassed) {
              body += '> **All quality gates passed.** This PR is ready for human review.\n';
            } else {
              body += '> **Some quality gates failed.** Please fix the violations listed above before merging.\n';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });
