name: AI Code Review (PR Agent)

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main

jobs:
  pr-agent:
    name: AI Pull Request Review
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build PR Agent config from guidelines
        run: bash scripts/build-pr-agent-config.sh --env

      - name: Debug - Display PR Agent config
        run: |
          echo "=== PR_AGENT_CONFIG (debug) ==="
          echo "${{ env.PR_AGENT_CONFIG }}"
          echo "=== End PR_AGENT_CONFIG ==="

      - name: Run PR Agent Review
        uses: Codium-ai/pr-agent@v0.35.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_BASE: "https://api.githubcopilot.com"
          PR_AGENT_CONFIG: ${{ env.PR_AGENT_CONFIG }}
