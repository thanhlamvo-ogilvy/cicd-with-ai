name: AI Code Review (PR Agent)

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main

jobs:
  pr-agent:
    name: AI Pull Request Review
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run PR Agent Review
        uses: Codium-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
         #  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Uncomment below to use GPT-4o instead:
          # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_AGENT_CONFIG: |
            [pr_reviewer]
            require_score_review = true
            inline_code_comments = true
            num_code_suggestions = 3

            extra_instructions = """
            YOU ARE A STRICT SENIOR ENGINEER REVIEWING A PULL REQUEST.

            Your task is to enforce the project's engineering standards with minimal false positives.
            DO NOT comment on code formatting, syntax, or type hints — GitHub Actions CI handles those.
            FOCUS ONLY on logical, architectural, and security concerns.

            REQUEST CHANGES (Block PR) IF YOU DETECT:

            1. SECURITY & PII VIOLATIONS:
               - SQL Injection: Reject f-strings or .format() in SQL. Demand SQLAlchemy ORM/Core bound parameters.
               - Hardcoded Secrets: Reject hardcoded API keys, passwords, or JWT secrets. Require environment variable loading.
               - PII Logging: Reject logging of passwords, tokens, API keys, or user message content.

            2. ERROR HANDLING & RESILIENCE:
               - Bare Exceptions: Reject bare `except:` or `except Exception:` without re-raising or specific handling.
               - Swallowed Errors: Reject empty except blocks or silently ignored errors.
               - External Calls: Demand explicit timeouts and exponential backoff for network/DB calls.

            3. ARCHITECTURE & API DESIGN:
               - Route Layering: Routes must be thin. Business logic belongs in services.
               - Response Schemas: Demand Pydantic response models with `model_config = ConfigDict(from_attributes=True)`.
               - Partial Updates: PATCH endpoints must use `exclude_unset=True` for optional fields.
               - HTTP Status Codes: POST→201, DELETE→204, GET→200, errors→4xx/5xx.
               - Pagination: List endpoints MUST support pagination (limit/offset or cursor).
               - Error Format: All errors must use `{"detail": "message"}` format.

            4. OBSERVABILITY:
               - Structured Logging: Demand `structlog.get_logger()`. Reject `print()` or stdlib `logging`.
               - AI Provider Logging: NEVER log request/response bodies. Log only: provider, model, token_count, latency.

            5. LANGUAGE & CODE QUALITY:
               - All code must be in English.
               - No dead code or commented-out blocks.
               - Single responsibility principle.

            COMMENT (Non-Blocking) IF YOU NOTICE:
               - Minor improvements or suggestions
               - Performance opportunities
               - Test coverage gaps

            IGNORE:
               - Code formatting (ruff handles this)
               - Type hints (mypy handles this)
               - Import organization (ruff handles this)
               - Any other mechanical/stylistic issue
            """

            [pr_code_suggestions]
            num_code_suggestions = 3
            extra_instructions = """
            When suggesting code improvements, strictly adhere to security, error handling, schema design, logging, and API design rules.
            Prioritize 3 suggestions max. Be specific with code examples. Focus on correctness over style.
            """
