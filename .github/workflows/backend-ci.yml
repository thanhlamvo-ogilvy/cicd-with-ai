name: Backend CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
      - 'pyproject.toml'

jobs:
  ruff:
    name: Ruff Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Upgrade pip
        run: pip install --upgrade "pip>=26.1"
      - name: Install dependencies
        run: |
          cd backend
          pip install -e ".[dev]"
      - name: Run Ruff lint
        run: |
          cd backend
          ruff check app/
      - name: Check code formatting
        run: |
          cd backend
          ruff format --check app/

  mypy:
    name: Type Check (Mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Upgrade pip
        run: pip install --upgrade "pip>=26.1"
      - name: Install dependencies
        run: |
          cd backend
          pip install -e ".[dev]"
      - name: Run Mypy type checking
        run: |
          cd backend
          mypy app/ --strict

  bandit:
    name: Bandit Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Upgrade pip
        run: pip install --upgrade "pip>=26.1"
      - name: Install dependencies
        run: |
          cd backend
          pip install -e ".[dev]"
      - name: Run Bandit security scan
        run: |
          cd backend
          bandit -r app/ -c pyproject.toml -f json -o bandit-report.json || true
      - name: Check Bandit results
        run: |
          cd backend
          # Fail if HIGH or CRITICAL severity issues found
          bandit -r app/ -c pyproject.toml -ll

  pytest:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Upgrade pip
        run: pip install --upgrade "pip>=26.1"
      - name: Install dependencies
        run: |
          cd backend
          pip install -e ".[dev]"
      - name: Run tests with coverage
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=html
      - name: Upload coverage reports
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/htmlcov/index.html
          flags: backend
          fail_ci_if_error: false

  pip-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Upgrade pip
        run: |
          cd backend
          pip install --upgrade "pip>=26.1"
      - name: Install dependencies
        run: |
          cd backend
          pip install -e ".[dev]"
      - name: Run pip-audit
        run: |
          cd backend
          pip-audit --skip-editable --desc || true
      - name: Fail on high-severity CVEs
        run: |
          cd backend
          pip-audit --skip-editable --desc

  status-check:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [ruff, mypy, bandit, pytest, pip-audit]
    if: always()
    steps:
      - name: Check job statuses
        run: |
          if [ "${{ needs.ruff.result }}" != "success" ] || \
             [ "${{ needs.mypy.result }}" != "success" ] || \
             [ "${{ needs.bandit.result }}" != "success" ] || \
             [ "${{ needs.pytest.result }}" != "success" ] || \
             [ "${{ needs.pip-audit.result }}" != "success" ]; then
            echo "❌ One or more CI checks failed"
            exit 1
          else
            echo "✅ All CI checks passed"
          fi
